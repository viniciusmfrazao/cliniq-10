name: Build Android

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (ex: 2)'
        required: true
        default: '1'
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Update version code and name
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.version_name }}\"/" android/app/build.gradle
          echo "Version updated:"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/clinike-release.keystore

      - name: Configure signing in build.gradle
        run: |
          # Adicionar configuração de signing via variáveis de ambiente
          # de forma mais robusta usando um arquivo keystore properties
          cat > android/keystore.properties << EOF
          storeFile=clinike-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

          # Verificar se já tem signingConfig release no build.gradle
          if ! grep -q "signingConfigs" android/app/build.gradle; then
            # Inserir signing config antes de "buildTypes"
            python3 -c "
          content = open('android/app/build.gradle').read()
          signing = '''
              signingConfigs {
                  release {
                      def props = new Properties()
                      def propsFile = rootProject.file('keystore.properties')
                      if (propsFile.exists()) { props.load(propsFile.newDataInputStream()) }
                      storeFile file(rootProject.projectDir.absolutePath + '/' + props['storeFile'])
                      storePassword props['storePassword']
                      keyAlias props['keyAlias']
                      keyPassword props['keyPassword']
                  }
              }
          '''
          content = content.replace('    buildTypes {', signing + '    buildTypes {')
          content = content.replace(
              '            release {',
              '            release {\n                signingConfig signingConfigs.release'
          )
          open('android/app/build.gradle', 'w').write(content)
          print('Signing config adicionado!')
          "
          else
            echo "signingConfigs já existe no build.gradle"
          fi

          echo "=== build.gradle final ==="
          cat android/app/build.gradle

      - name: Build release AAB
        id: gradle_build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace 2>&1 | tee /tmp/gradle_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        continue-on-error: true

      - name: Show Gradle error
        if: always()
        run: |
          echo "=== ÚLTIMAS 100 LINHAS DO GRADLE ==="
          tail -100 /tmp/gradle_output.txt || echo "sem output"
          echo "=== ARQUIVOS GERADOS ==="
          find android/app/build/outputs -type f 2>/dev/null || echo "nenhum output gerado"

      - name: Fail if build failed
        if: steps.gradle_build.outcome == 'failure'
        run: exit 1

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: clinike-release-v${{ github.event.inputs.version_name }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build info
        run: |
          echo "✅ Build concluído!"
          echo "Version: ${{ github.event.inputs.version_name }} (${{ github.event.inputs.version_code }})"
          ls -lh android/app/build/outputs/bundle/release/
