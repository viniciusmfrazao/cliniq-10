name: Build Android

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (ex: 2)'
        required: true
        default: '1'
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cap sync
        run: |
          mkdir -p out
          echo '<html><body>Clinike</body></html>' > out/index.html
          npx cap sync android

      - name: Update version
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.version_name }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/clinike-release.keystore
          ls -lh android/clinike-release.keystore

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << PROPS
          storeFile=clinike-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS
          echo "keystore.properties criado"

      - name: Build release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease 2>&1 | tail -80

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: clinike-v${{ github.event.inputs.version_name }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Done
        run: |
          echo "✅ Build concluído!"
          ls -lh android/app/build/outputs/bundle/release/
