name: Build Android

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (ex: 2)'
        required: true
        default: '1'
      version_name:
        description: 'Version name (ex: 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Check versions
        run: |
          node -v
          npm -v
          java -version

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cap sync
        run: |
          mkdir -p out
          echo '<html><body>Clinike</body></html>' > out/index.html
          npx cap sync android 2>&1 | tee /tmp/capsync.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload cap sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capsync-log
          path: /tmp/capsync.log
          retention-days: 3

      - name: Update version
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.version_name }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/clinike-release.keystore
          ls -lh android/app/clinike-release.keystore

      - name: Create keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf 'storeFile=app/clinike-release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/keystore.properties
          echo "keystore.properties criado:"
          cat android/keystore.properties | sed 's/Password=.*/Password=***/'

      - name: Build release AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace --warning-mode all 2>&1 | tee /tmp/gradle_build.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_build.log
          retention-days: 3

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: clinike-v${{ github.event.inputs.version_name }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Done
        run: |
          echo "✅ Build concluído!"
          ls -lh android/app/build/outputs/bundle/release/
