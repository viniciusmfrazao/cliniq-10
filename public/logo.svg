<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B69"/>
      <stop offset="50%" style="stop-color:#3D2785"/>
      <stop offset="100%" style="stop-color:#4C35A0"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Cross/Plus vertical bar -->
  <rect x="216" y="96" width="80" height="320" rx="40" fill="url(#crossGrad)" filter="url(#shadow)"/>
  
  <!-- Cross/Plus horizontal bar -->
  <rect x="96" y="216" width="320" height="80" rx="40" fill="url(#crossGrad)" filter="url(#shadow)"/>
  
  <!-- Pink dot -->
  <circle cx="380" cy="132" r="36" fill="#EC4899"/>
  <circle cx="380" cy="132" r="24" fill="#F472B6"/>
</svg>
